<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genesis | Initialization Protocol v9.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #b89b5e; --bg: #030303; --panel: #0a0a0a; --border: rgba(184, 155, 94, 0.2); --text: #dcdcdc; --sub-text: #666; }

        body { background: var(--bg); color: var(--gold); font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; font-size: 12px; overflow-x: hidden; }

        .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; opacity: 0.1; }
        .scanline { position: fixed; top: 0; left: 0; width: 100%; height: 2px; background: rgba(184, 155, 94, 0.1); box-shadow: 0 0 10px var(--gold); animation: scan 4s linear infinite; z-index: 100; pointer-events: none; }
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }

        .login-container { width: 400px; background: var(--panel); padding: 40px; border: 1px solid var(--border); position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5); z-index: 10; margin: 100px 0; }
        h2 { font-family: 'Cinzel'; text-align: center; letter-spacing: 5px; margin-bottom: 30px; color: #fff; text-shadow: 0 0 10px var(--gold); }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 8px; letter-spacing: 2px; margin-bottom: 8px; color: var(--gold); opacity: 0.8; text-transform: uppercase; }

        input { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid #222; padding: 12px; color: #fff; font-family: 'JetBrains Mono'; font-size: 11px; box-sizing: border-box; }
        input:focus { border-color: var(--gold); outline: none; }

        #patternCanvas { background: rgba(0,0,0,0.3); border-radius: 8px; cursor: crosshair; border: 1px solid #222; touch-action: none; margin-top: 10px; }
        button { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel'; cursor: pointer; transition: 0.4s; letter-spacing: 3px; font-weight: bold; margin-top: 20px; }
        button:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px var(--gold); }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="scanline"></div>

    <div class="login-container">
        <h2>IDENTIFICATION</h2>
        <form method="POST">
            <input type="hidden" name="next" value="{{ next_page or '' }}">

            <div class="input-group">
                <label>DIGITAL_ID [EMAIL]</label>
                <input type="email" name="email" placeholder="SUBJECT@DOMAIN.COM" required>
            </div>
            <div class="input-group">
                <label>ACCESS_PHRASE [PASSWORD]</label>
                <input type="password" name="password" placeholder="•••••••••" required>
            </div>
            <div class="input-group" style="text-align: center;">
                <label>GRAPHIC_KEY [BIOMETRIC]</label>
                <canvas id="patternCanvas" width="240" height="240"></canvas>
                <input type="hidden" name="pattern" id="pattern-input">
                <div id="status" style="font-size: 8px; margin-top: 10px; opacity: 0.5;">STATUS: AWAITING_KEY</div>
            </div>
            <button type="submit" id="loginBtn">INITIALIZE_SESSION</button>
        </form>
    </div>

    <script>
        const canvas = document.getElementById('patternCanvas');
        const ctx = canvas.getContext('2d');
        const patternInput = document.getElementById('pattern-input');
        const statusText = document.getElementById('status');
        const btn = document.getElementById('loginBtn');
        let isDrawing = false;
        let points = [];
        let selectedPoints = [];

        const initGrid = () => {
            const step = canvas.width / 4;
            for (let r = 1; r <= 3; r++) {
                for (let c = 1; c <= 3; c++) {
                    points.push({ x: c * step, y: r * step, id: points.length + 1 });
                }
            }
        };
        initGrid();

        const draw = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (selectedPoints.length > 0) {
                ctx.beginPath(); ctx.strokeStyle = '#b89b5e'; ctx.lineWidth = 3;
                const start = points[selectedPoints[0]-1];
                ctx.moveTo(start.x, start.y);
                selectedPoints.forEach(id => { const p = points[id-1]; ctx.lineTo(p.x, p.y); });
                ctx.stroke();
            }
            points.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2);
                ctx.fillStyle = selectedPoints.includes(p.id) ? '#b89b5e' : '#1a1a1a';
                ctx.fill();
            });
        };

        const handleMove = (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const pos = {
                x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left,
                y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top
            };
            points.forEach(p => {
                const dist = Math.hypot(p.x - pos.x, p.y - pos.y);
                if (dist < 25 && !selectedPoints.includes(p.id)) {
                    selectedPoints.push(p.id);
                    draw();
                }
            });
        };

        canvas.addEventListener('mousedown', () => { isDrawing = true; selectedPoints = []; });
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => {
            isDrawing = false;
            patternInput.value = selectedPoints.join('');
            if(selectedPoints.length > 0) {
                statusText.innerText = "> КЛЮЧ СФОРМИРОВАН: [ " + selectedPoints.length + " NODES ]";
                btn.style.borderColor = '#00ff41';
                btn.style.color = '#00ff41';
                btn.innerText = "INITIALIZE_READY";
            }
        });
        draw();
    </script>
</body>
</html>
