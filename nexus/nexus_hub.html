<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GENESIS | NEXUS ORCHESTRATOR v8.2 PRO</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.21.1/cytoscape.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Almendra:wght@400;700&family=Inter:wght@300;400;600;700&family=Cinzel:wght@700&family=Cinzel+Decorative:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #050505;
            --panel: rgba(10, 10, 10, 0.98);
            --gold: #b89b5e;
            --gold-dim: rgba(184, 155, 94, 0.2);
            --border: rgba(184, 155, 94, 0.2);
            --text: #dcdcdc;
            --sub-text: #666;
            --danger: #8b0000;
            --success: #2d5a27;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow: hidden;
        }

        /* Витрувианская подложка */
        .vitruvian-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75vh; height: 75vh; z-index: 0;
            background: url('https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Da_Vinci_Vitruve_Luc_Viatour.jpg/800px-Da_Vinci_Vitruve_Luc_Viatour.jpg') no-repeat center;
            background-size: contain; opacity: 0.03; filter: invert(1) sepia(1);
            animation: pulse-slow 20s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.02; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.05; transform: translate(-50%, -50%) scale(1.05); }
        }

        #cy { position: absolute; width: 100vw; height: calc(100vh - 70px); z-index: 5; }

        /* Панели */
        .side-panel {
            position: fixed; background: var(--panel); border: 1px solid var(--border);
            z-index: 100; padding: 20px; backdrop-filter: blur(20px);
            box-shadow: 0 0 40px rgba(0,0,0,0.8); display: flex; flex-direction: column;
        }
        .left-panel { top: 20px; left: 20px; bottom: 90px; width: 360px; }
        .right-panel { top: 20px; right: 20px; bottom: 90px; width: 440px; }

        .header-title {
            font-family: 'Cinzel', serif; font-size: 15px; color: var(--gold);
            border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px;
            letter-spacing: 2px; text-transform: uppercase; display: flex; justify-content: space-between;
        }

        /* Элементы метрик */
        .stat-row { margin-bottom: 15px; font-family: 'JetBrains Mono', monospace; }
        .stat-header { display: flex; justify-content: space-between; font-size: 10px; color: var(--sub-text); margin-bottom: 5px; text-transform: uppercase; }
        .progress-bar { width: 100%; height: 3px; background: rgba(255,255,255,0.05); overflow: hidden; }
        .progress-fill { height: 100%; background: var(--gold); box-shadow: 0 0 10px var(--gold); transition: width 1.5s ease-in-out; }

        .chart-box { height: 140px; border: 1px solid var(--border); background: rgba(0,0,0,0.3); margin: 15px 0; padding: 5px; }

        /* Инспектор и Терминал */
        .terminal {
            background: rgba(0,0,0,0.6); border: 1px solid var(--border);
            padding: 15px; flex-grow: 1; overflow-y: auto;
            font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #aaa;
            line-height: 1.6; border-radius: 2px;
        }
        .terminal b { color: var(--gold); }
        .node-name-large { font-family: 'Almendra', serif; font-size: 26px; color: var(--gold); margin-bottom: 5px; }

        /* Кнопки */
        .btn-nexus {
            background: rgba(184, 155, 94, 0.05); border: 1px solid var(--border); color: var(--gold);
            padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer;
            width: 100%; transition: 0.3s; margin-top: 10px; text-transform: uppercase; font-weight: 700;
        }
        .btn-nexus:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold-dim); }
        .btn-danger { border-color: var(--danger); color: var(--danger); margin-top: auto; }

        /* Футер (Клон index.html) */
        footer {
            position: fixed; bottom: 0; width: 100%; height: 70px;
            background: #0a0a0a; border-top: 1px solid var(--border);
            display: grid; grid-template-columns: 1fr 2fr 1fr; align-items: center;
            padding: 0 30px; z-index: 1000;
        }
        .f-part { display: flex; align-items: center; gap: 20px; }
        .f-label { color: #444; font-size: 9px; font-family: 'JetBrains Mono'; text-transform: uppercase; }
        .f-value { color: var(--gold); font-size: 11px; font-family: 'JetBrains Mono'; font-weight: bold; }
        .f-center { justify-content: center; font-family: 'Cinzel', serif; letter-spacing: 5px; font-size: 14px; color: var(--gold); }
        #footer-time { font-family: 'JetBrains Mono'; font-size: 14px; color: #fff; margin-left: 15px; }

    </style>
</head>
<body>

<div class="vitruvian-overlay"></div>

<div class="side-panel left-panel">
    <div class="header-title">System Metrics <span>v8.2</span></div>

    <div class="stat-row">
        <div class="stat-header"><span>Core Stability</span><span>99.1%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width: 99.1%"></div></div>
    </div>

    <div class="stat-row">
        <div class="stat-header"><span>Memory Load</span><span>24%</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width: 24%; opacity: 0.6;"></div></div>
    </div>

    <div class="chart-box">
        <canvas id="loadChart"></canvas>
    </div>

    <div class="header-title" style="margin-top: 10px;">Forge Command</div>
    <button class="btn-nexus" onclick="forgeNewBlueprint()">🔨 Forge New Blueprint</button>
    <button class="btn-nexus" onclick="location.reload()">🔄 Re-Sync Spheres</button>

    <button class="btn-nexus btn-danger" onclick="window.location.href='/admin/'">Return to Core</button>
</div>

<div class="side-panel right-panel">
    <div id="node-inspector">
        <div class="header-title">Nexus Inspector</div>
        <div class="node-name-large" id="ins-label">Select Node</div>
        <div style="font-family: 'JetBrains Mono'; font-size: 10px; color: var(--sub-text); margin-bottom: 20px;" id="ins-id">ID: NONE</div>

        <div id="ins-actions" style="margin-bottom: 20px;"></div>

        <div class="stat-header" style="margin-bottom: 5px;">Codex Stream:</div>
        <div class="terminal" id="ins-terminal">
            <span style="color: #444;">> Awaiting neural link...</span>
        </div>
    </div>
</div>

<div id="cy"></div>

<footer>
    <div class="f-part">
        <div><span class="f-label">System:</span> <span class="f-value" style="color: #2d5a27;">● NOMINAL</span></div>
        <div><span class="f-label">Node:</span> <span class="f-value" id="f-active-node">ROOT</span></div>
    </div>
    <div class="f-part f-center">
        GENESIS <span style="opacity:0.2; margin: 0 15px;">|</span> NEXUS HUB
    </div>
    <div class="f-part" style="justify-content: flex-end;">
        <div><span class="f-label">Path:</span> <span class="f-value">ADMIN/NEXUS_HUB</span></div>
        <div id="footer-time">00:00:00</div>
    </div>
</footer>

<script>
    // 1. Часы и График
    function updateTime() {
        const now = new Date();
        document.getElementById('footer-time').innerText = now.toLocaleTimeString('ru-RU', { hour12: false });
    }
    setInterval(updateTime, 1000); updateTime();

    const ctx = document.getElementById('loadChart').getContext('2d');
    const loadChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['', '', '', '', '', '', ''],
            datasets: [{
                data: [10, 15, 12, 18, 14, 22, 19],
                borderColor: '#b89b5e',
                borderWidth: 1.5,
                tension: 0.4,
                pointRadius: 0,
                fill: true,
                backgroundColor: 'rgba(184, 155, 94, 0.05)'
            }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: { y: { display: false }, x: { display: false } },
            responsive: true, maintainAspectRatio: false
        }
    });

    // 2. Инициализация Cytoscape
    document.addEventListener('DOMContentLoaded', function() {
        fetch('/admin/nexus/nodes')
            .then(res => res.json())
            .then(data => {
                const cy = cytoscape({
                    container: document.getElementById('cy'),
                    elements: [...data.nodes, ...data.edges],
                    style: [
                        { selector: 'node', style: {
                            'background-color': '#000', 'border-width': 1, 'border-color': '#b89b5e',
                            'label': 'data(label)', 'color': '#b89b5e', 'font-family': 'JetBrains Mono',
                            'font-size': '11px', 'text-valign': 'bottom', 'text-margin-y': 8,
                            'width': 55, 'height': 55, 'shape': 'diamond'
                        }},
                        { selector: 'node[type="center"]', style: { 'width': 85, 'height': 85, 'shape': 'star', 'background-color': '#b89b5e', 'color': '#fff' }},
                        { selector: 'node[type="database"]', style: { 'shape': 'hexagon', 'background-color': '#111' }},
                        { selector: 'edge', style: {
                            'width': 1, 'line-color': 'rgba(184, 155, 94, 0.15)',
                            'curve-style': 'bezier', 'target-arrow-shape': 'chevron', 'target-arrow-color': '#b89b5e'
                        }},
                        { selector: ':selected', style: { 'border-width': 3, 'border-color': '#fff' }}
                    ],
                    layout: { name: 'cose', padding: 100, animate: true }
                });

                cy.on('tap', 'node', function(evt){
                    const node = evt.target.data();

                    // Обновление UI
                    document.getElementById('ins-label').innerText = node.label;
                    document.getElementById('ins-id').innerText = `ID: ${node.id.toUpperCase()}`;
                    document.getElementById('f-active-node').innerText = node.id.toUpperCase();

                    // Инспекция через HTMX
                    if(node.full_path) {
                        htmx.ajax('GET', `/admin/nexus/inspect?path=${encodeURIComponent(node.full_path)}`, {
                            target: '#ins-terminal', swap: 'innerHTML'
                        });
                    }

                    // Генерация кнопок функций
                    const actionsDiv = document.getElementById('ins-actions');
                    actionsDiv.innerHTML = '';
                    if(node.actions && node.actions.length > 0) {
                        node.actions.forEach(a => {
                            const b = document.createElement('button');
                            b.className = 'btn-nexus';
                            b.innerHTML = `⚡ EXEC: ${a.replace('nexus_', '').toUpperCase()}`;
                            b.onclick = () => runNexusProtocol(node.id, a);
                            actionsDiv.appendChild(b);
                        });
                    } else {
                        actionsDiv.innerHTML = '<div style="font-size:10px; color:#444;">NO DIRECTIVE HOOKS FOUND</div>';
                    }
                });
            });
    });

    // 3. Функции управления
    function runNexusProtocol(moduleId, action) {
        const term = document.getElementById('ins-terminal');
        term.innerHTML += `<br><b>> RUNNING:</b> ${action}...`;
        term.scrollTop = term.scrollHeight;

        fetch('/admin/nexus/execute', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ module: moduleId, command: action })
        })
        .then(res => res.json())
        .then(data => {
            const color = data.status === 'success' ? '#2d5a27' : '#8b0000';
            term.innerHTML += `<br><span style="color:${color}">> [RESPONSE]: ${data.data || data.message}</span>`;
            term.scrollTop = term.scrollHeight;
        })
        .catch(err => {
            term.innerHTML += `<br><span style="color:var(--danger)">> CRITICAL: LINK INTERRUPTED</span>`;
        });
    }

    function forgeNewBlueprint() {
        const name = prompt("Enter Name for the New Archetype:");
        if (!name) return;

        const term = document.getElementById('ins-terminal');
        term.innerHTML += `<br><span style="color:var(--gold)">> FORGING MODULE: ${name}...</span>`;

        fetch('/admin/nexus/forge', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: name })
        })
        .then(res => res.json())
        .then(data => {
            if(data.status === 'success') {
                alert("The forge has completed the task.");
                location.reload();
            } else {
                alert("The forge failed: " + data.message);
            }
        });
    }
</script>

</body>
</html>
