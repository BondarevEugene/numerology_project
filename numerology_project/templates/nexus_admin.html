<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>NEXUS | ORCHESTRATOR PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #030303; color: #b89b5e; font-family: 'JetBrains Mono', monospace; }
        .nexus-grid { display: grid; grid-template-columns: 300px 1fr; gap: 20px; padding: 40px; }
        .panel { border: 1px solid rgba(184,155,94,0.3); padding: 20px; background: #0a0a0a; }
    </style>
</head>
<body>
    <div class="nexus-grid">
        <div class="panel">
            <h2>NEXUS_NODES</h2>
            <div id="node-list">
                <p>> SYSTEM_READY</p>
            </div>
        </div>
        <div class="panel">
            <h2>ORCHESTRATOR_TERMINAL</h2>
            <div id="ins-terminal" style="height: 400px; overflow-y: auto; background: #000; padding: 10px;"></div>
        </div>
    </div>
</body>
</html>
