<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genesis | Leela Path</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@1,400&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --bg: #050505;
            --panel: rgba(15, 15, 15, 0.8);
            --border: rgba(197, 160, 89, 0.2);
        }

        body {
            background: var(--bg);
            color: #ccc;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
        }

        /* Декоративные ауры на фоне */
        .aura {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.2;
            animation: move 20s infinite alternate;
        }
        .aura-1 { background: var(--gold); top: -10%; left: -10%; }
        .aura-2 { background: #4b0082; bottom: -10%; right: -10%; animation-delay: -5s; }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 100px); }
        }

        .lila-container {
            max-width: 800px;
            width: 90%;
            background: var(--panel);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .lila-container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 3rem;
            margin-bottom: 10px;
            letter-spacing: 8px;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.3);
        }

        .subtitle {
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: 1.1rem;
            color: #888;
            margin-bottom: 40px;
        }

        .game-status {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 50px;
        }

        .status-box {
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
        }

        .status-box span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gold);
            margin-bottom: 8px;
        }

        .status-box b {
            font-size: 1.5rem;
            font-family: 'Cinzel';
            color: #fff;
        }

        .die-button {
            background: linear-gradient(135deg, var(--gold) 0%, #8a6d35 100%);
            color: #000;
            border: none;
            padding: 25px 60px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: 1.2rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 30px rgba(197, 160, 89, 0.3);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .die-button:hover {
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 15px 40px rgba(197, 160, 89, 0.5);
        }

        .die-button:active {
            transform: scale(0.95);
        }

        .history-log {
            margin-top: 50px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            font-size: 0.9rem;
            border-left: 2px solid var(--gold);
        }

        .history-log p {
            margin: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 5px;
        }

        /* Кастомный скроллбар */
        .history-log::-webkit-scrollbar { width: 4px; }
        .history-log::-webkit-scrollbar-track { background: transparent; }
        .history-log::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .back-link {
            position: absolute;
            top: 30px;
            left: 30px;
            color: var(--gold);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.5;
            transition: 0.3s;
        }
        .back-link:hover { opacity: 1; }

    </style>
</head>
<body>

    <div class="aura aura-1"></div>
    <div class="aura aura-2"></div>

    <a href="/" class="back-link">← ВЕРНУТЬСЯ В ГЕНЕЗИС</a>

    <div class="lila-container">
        <h1>LEELA</h1>
        <div class="subtitle">Игра Самопознания • Поток {{ user_name if user_name else 'Странника' }}</div>

        <div class="game-status">
            <div class="status-box">
                <span>Клетка</span>
                <b id="current-pos">1</b>
            </div>
            <div class="status-box">
                <span>Состояние</span>
                <b id="current-state">Рождение</b>
            </div>
            <div class="status-box">
                <span>Бросок</span>
                <b id="last-roll">-</b>
            </div>
        </div>

        <button class="die-button" onclick="rollDice()">Бросить кубик</button>

        <div class="history-log" id="log">
            <p>Система готова к инициализации. Ожидание первого импульса...</p>
        </div>
    </div>

    <script>
        // Сюда можно интегрировать твою логику игры (JS)
        function rollDice() {
            const roll = Math.floor(Math.random() * 6) + 1;
            document.getElementById('last-roll').innerText = roll;

            // Пример лога
            const log = document.getElementById('log');
            const p = document.createElement('p');
            p.innerHTML = `<span style="color:var(--gold)">[Всплеск]</span> Выпало ${roll}. Переход в новое состояние...`;
            log.prepend(p);

            // Эффект вибрации при броске
            document.querySelector('.lila-container').style.animation = 'glitch 0.2s 2';
            setTimeout(() => { document.querySelector('.lila-container').style.animation = ''; }, 200);
        }
    </script>
</body>
</html>
