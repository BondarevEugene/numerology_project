<div class="panel">
    <h3>ADD_EVOLUTION_PROTOCOL</h3>
    <form method="POST">
        <select name="category" class="genesis-input">
            <option value="NUTRITION">NUTRITION</option>
            <option value="SPORT">SPORT</option>
            <option value="MIND">MIND</option>
        </select>
        <input type="number" name="sector" placeholder="SECTOR (1-9)" class="genesis-input">
        <input type="text" name="title" placeholder="PROTOCOL_TITLE" class="genesis-input">
        <textarea name="content" placeholder="DEEP_CONTENT" class="genesis-input"></textarea>
        <button type="submit" class="btn-action">ACTIVATE_PROTOCOL</button>
    </form>
</div>
