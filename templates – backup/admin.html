<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>GENESIS ADMIN V5</title>
    <script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>
    <style>
        body { background: #060709; color: #ccc; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; text-align: center; cursor: pointer; }
        #editor-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); padding: 20px; overflow-y: auto; }
        .modal { background: #111; max-width: 800px; margin: auto; padding: 20px; border: 1px solid #d4af37; }
        input { width: 100%; margin-bottom: 10px; padding: 10px; background: #000; color: #fff; border: 1px solid #444; }
    </style>
</head>
<body>
    <h1>GENESIS CONTROL PANEL</h1>
    <div class="grid">
        {% for i in range(1, 10) %}
        <div class="card" onclick="openEditor({{ i }})"><h2>{{ i }}</h2><p>АРХЕТИП</p></div>
        {% endfor %}
    </div>

    <div id="editor-overlay">
        <div class="modal">
            <h2 id="m-title">АРКАН</h2>
            <input type="hidden" id="m-num">
            <input type="text" id="ed-title" placeholder="Титул">
            <input type="text" id="ed-planet" placeholder="Планета">
            <input type="text" id="ed-element" placeholder="Стихия">
            <input type="text" id="ed-search_queries" placeholder="Запросы">

            {% for id in ['action_power','shadow_side','exit_minus','growth_point','realization','karmic_tasks','development_cycle','life_result','mind_power','partner_type','financial_tip','health_tips'] %}
            <textarea id="ed-{{ id }}"></textarea>
            {% endfor %}

            <button onclick="saveData()" style="width:100%; padding:20px; background:#d4af37; margin-top:10px;">СОХРАНИТЬ</button>
            <button onclick="location.reload()" style="width:100%; background:none; color:red; border:none; margin-top:10px;">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        const fields = ['action_power','shadow_side','exit_minus','growth_point','realization','karmic_tasks','development_cycle','life_result','mind_power','partner_type','financial_tip','health_tips'];
        async function openEditor(n) {
            document.getElementById('m-num').value = n;
            document.getElementById('m-title').innerText = "АРКАН " + n;
            document.getElementById('editor-overlay').style.display = 'block';
            const res = await fetch(`/admin/get/${n}`);
            const d = await res.json();
            const a = d.data;
            document.getElementById('ed-title').value = a.title || '';
            document.getElementById('ed-planet').value = a.planet || '';
            document.getElementById('ed-element').value = a.element || '';
            document.getElementById('ed-search_queries').value = a.search_queries || '';
            fields.forEach(f => {
                if (!CKEDITOR.instances['ed-'+f]) CKEDITOR.replace('ed-'+f, {height: 100});
                setTimeout(() => { CKEDITOR.instances['ed-'+f].setData(a[f] || ''); }, 200);
            });
        }
        async function saveData() {
            const n = document.getElementById('m-num').value;
            const p = { number: n, title: document.getElementById('ed-title').value, planet: document.getElementById('ed-planet').value, element: document.getElementById('ed-element').value, search_queries: document.getElementById('ed-search_queries').value };
            fields.forEach(f => { p[f] = CKEDITOR.instances['ed-'+f].getData(); });
            await fetch('/admin/update', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(p) });
            alert("OK"); location.reload();
        }
    </script>
</body>
</html>
