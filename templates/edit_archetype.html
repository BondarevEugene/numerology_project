<div id="archetypes" class="tab-content" style="display:none;">
    {% for a in archetypes %}
    <div class="edit-card">
        <form id="form-{{ a.id }}" onsubmit="saveRichData(event, 'arch', {{ a.id }})">
            <h3 style="font-family:Cinzel; color:var(--gold);">Archetype {{ a.number }}</h3>
            <input type="text" name="title" class="form-input" value="{{ a.title }}" style="margin-bottom:15px;">

            <div id="editor-{{ a.id }}" class="quill-editor">{{ a.full_text|safe }}</div>

            <input type="hidden" name="full_text_html" id="hidden-{{ a.id }}">

            <button type="submit" class="btn-action" style="margin-top:20px;">UPDATE ARCHETYPE</button>
        </form>
    </div>
    {% endfor %}
</div>
