<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis | Sacred System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --copper: #b08d57;
            --gold: #d4af37;
            --void: #060709;
            --card-bg: #0c0e12;
            --text: #a0a0a0;
        }

        body {
            background: var(--void);
            background-image: radial-gradient(circle at center, #11141a 0%, #060709 100%);
            color: var(--text);
            font-family: 'Lora', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .main-card {
            background: var(--card-bg);
            border: 1px solid rgba(176, 141, 87, 0.2);
            padding: 60px 40px;
            width: 100%;
            max-width: 750px;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            margin: 40px 20px;
            position: relative;
        }

        /* Декоративные углы */
        .main-card::before {
            content: ""; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(176, 141, 87, 0.05); pointer-events: none;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--copper);
            text-align: center;
            letter-spacing: 12px;
            font-size: 2.5rem;
            margin-bottom: 50px;
            text-shadow: 0 0 15px rgba(176, 141, 87, 0.3);
        }

        .section-label {
            font-family: 'Cinzel', serif;
            color: var(--copper);
            font-size: 0.65rem;
            letter-spacing: 3px;
            margin-bottom: 10px;
            display: block;
            opacity: 0.8;
        }

        .form-control {
            background: transparent !important;
            border: none !important;
            border-bottom: 1px solid rgba(176, 141, 87, 0.3) !important;
            color: #fff !important;
            width: 100%;
            padding: 12px 5px;
            margin-bottom: 30px;
            font-size: 1.1rem;
            transition: 0.4s;
        }

        .form-control:focus {
            outline: none;
            border-bottom: 1px solid var(--gold) !important;
            background: rgba(176, 141, 87, 0.02) !important;
        }

        .date-grid { display: flex; gap: 20px; }

        .btn-execute {
            background: transparent;
            color: var(--copper);
            border: 1px solid var(--copper);
            font-family: 'Cinzel', serif;
            padding: 18px;
            width: 100%;
            letter-spacing: 5px;
            cursor: pointer;
            transition: 0.5s;
            margin-top: 20px;
        }

        .btn-execute:hover {
            background: var(--copper);
            color: var(--void);
            box-shadow: 0 0 30px rgba(176, 141, 87, 0.4);
        }

        /* --- Стили Результата --- */
        .result-panel {
            margin-top: 80px;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .mystic-header {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 50px 0 30px;
        }

        .mystic-header::before, .mystic-header::after {
            content: ""; flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--copper), transparent);
        }

        .mystic-header span {
            padding: 0 20px;
            font-family: 'Cinzel', serif;
            color: var(--copper);
            font-size: 1.3rem;
            letter-spacing: 4px;
        }

        .paragrapth {
            line-height: 1.9;
            font-size: 1.1rem;
            margin-bottom: 25px;
            text-align: justify;
            color: #d1d1d1;
        }

        .task-row {
            display: flex;
            background: rgba(176, 141, 87, 0.03);
            border-left: 2px solid var(--copper);
            padding: 15px 20px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .task-row:hover {
            background: rgba(176, 141, 87, 0.07);
            transform: translateX(5px);
        }

        .task-row .icon {
            color: var(--gold);
            margin-right: 15px;
            font-size: 1.2rem;
        }

        .gold-accent {
            color: var(--gold);
            font-weight: 500;
        }

        .typewriter-title {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        .action-zone {
            margin-top: 60px;
            text-align: center;
        }

        .pdf-link-premium {
            text-decoration: none;
            color: var(--copper);
            font-family: 'Cinzel', serif;
            font-size: 0.8rem;
            letter-spacing: 3px;
            padding: 15px 40px;
            border: 1px solid var(--copper);
            transition: 0.4s;
        }

        .pdf-link-premium:hover {
            background: var(--copper);
            color: var(--void);
        }

        ::placeholder { color: #2a2a2a; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="main-card">
        <h1>Genesis</h1>

        <form method="POST">
            <span class="section-label">Identity Designation</span>
            <input type="text" name="name" class="form-control" placeholder="NAME / ФИО" required>

            <span class="section-label">Digital Frequency</span>
            <input type="email" name="email" class="form-control" placeholder="EMAIL" required>

            <span class="section-label">Temporal Coordinates</span>
            <div class="date-grid">
                <input type="number" name="day" class="form-control" placeholder="DD" min="1" max="31" required>
                <input type="number" name="month" class="form-control" placeholder="MM" min="1" max="12" required>
                <input type="number" name="year" class="form-control" placeholder="YYYY" min="1900" max="2026" required>
            </div>

            <button type="submit" class="btn-execute">Begin Analysis</button>
        </form>

        {% if result %}
        <div class="result-panel" id="resultTrigger">
            <h2 class="typewriter-title">{{ result.title }}</h2>

            <div class="analysis-content">
                {{ result.full_text | genesis_style }}
            </div>

            <div class="action-zone">
                <a href="/download/{{ pdf_file }}" class="pdf-link-premium">Extract Full PDF Archive</a>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", function() {
                const element = document.getElementById('resultTrigger');
                if (element) {
                    element.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        </script>
        {% endif %}
    </div>
</body>
</html>
