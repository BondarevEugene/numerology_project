<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Расчет Предназначения</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; padding-top: 50px; }
        .form-container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 form-container">
            <h2 class="text-center mb-4">Введите данные для расчета</h2>
            <form method="POST">
                <div class="mb-3">
                    <label>Имя</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <label>Дата рождения</label>
                <div class="row mb-4">
                    <div class="col-4"><input type="number" name="day" placeholder="День" class="form-control" min="1" max="31" required></div>
                    <div class="col-4"><input type="number" name="month" placeholder="Месяц" class="form-control" min="1" max="12" required></div>
                    <div class="col-4"><input type="number" name="year" placeholder="Год" class="form-control" min="1950" max="2026" required></div>
                </div>
                <button type="submit" class="btn btn-primary w-100">РАССЧИТАТЬ</button>
            </form>

            {% if result %}
            <div class="mt-5 p-4 border-top">
                <h3>{{ result.title }}</h3>
                <p style="white-space: pre-wrap;">{{ result.body }}</p>
                <a href="/download/{{ pdf_file }}" class="btn btn-success mt-3">СКАЧАТЬ PDF</a>
            </div>
            {% endif %}
        </div>
    </div>
</div>
</body>
</html>
