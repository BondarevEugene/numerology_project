<section class="sidebar-form">
    <div class="panel-header">
        SUBJECT IDENTIFICATION
    </div>
    <form method="POST" action="{{ url_for('dashboard.index_v3') }}">
        <div class="form-group">
            <label>Имя пользователя</label>
            <input
                type="text"
                name="user_name"
                placeholder="Введите имя"
                required>
        </div>
        <div class="form-group">
            <label>Дата рождения</label>
            <div class="date-grid">
                <input
                    type="text"
                    name="day"
                    maxlength="2"
                    placeholder="ДД"
                    required>
                <input
                    type="text"
                    name="month"
                    maxlength="2"
                    placeholder="ММ"
                    required>
                <input
                    type="text"
                    name="year"
                    maxlength="4"
                    placeholder="ГГГГ"
                    required>
            </div>
        </div>
        <button
            type="submit"
            class="genesis-btn">
            EXECUTE ANALYSIS
        </button>
    </form>
</section>
