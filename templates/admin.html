<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Genesis | Terminal Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background: #060709; color: #a0a0a0; font-family: sans-serif; padding: 40px; }
        h1 { font-family: 'Cinzel', serif; color: #b08d57; letter-spacing: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; background: #0c0e12; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #1d2026; }
        th { color: #b08d57; font-family: 'Cinzel', serif; font-size: 0.8rem; }
        tr:hover { background: #11141a; }
        .archetype-badge { background: #b08d57; color: #060709; padding: 2px 8px; border-radius: 3px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Sacred Database Records</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Дата</th>
                <th>Имя</th>
                <th>Email</th>
                <th>ДР</th>
                <th>Число</th>
                <th>Профессии</th>
            </tr>
        </thead>
        <tbody>
            {% for r in records %}
            <tr>
                <td>{{ r.id }}</td>
                <td>{{ r.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
                <td>{{ r.name }}</td>
                <td>{{ r.email }}</td>
                <td>{{ r.birth_date }}</td>
                <td><span class="archetype-badge">{{ r.archetype }}</span></td>
                <td style="font-size: 0.8rem;">{{ r.professions }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
