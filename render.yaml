services:
  - type: web
    name: genesis-psychology-app
    env: python
    plan: free
    region: frankfurt # Или ohio, singapore
    buildCommand: ./build.sh
      apt-get update && apt-get install -y wkhtmltopdf
      pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true # Render сам создаст надежный ключ
      - key: DATABASE_URL
        fromDatabase:
          name: genesis-db
          property: connectionString

databases:
  - name: genesis-db
    plan: free
    region: frankfurt